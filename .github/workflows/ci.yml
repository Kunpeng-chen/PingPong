name: CI

on:
  push:
    branches: [ main, dev, 'copilot/**' ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Configure
        run: |
          mkdir build
          cd build
          CC=${{ matrix.compiler }} cmake ..

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure

  coverage:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake lcov

      - name: Configure with coverage
        run: |
          mkdir build
          cd build
          CC=gcc cmake -DCMAKE_C_FLAGS="--coverage -O0 -g" -DCMAKE_EXE_LINKER_FLAGS="--coverage" ..

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure

      - name: Collect coverage
        run: |
          lcov --capture --directory build --output-file coverage.info --rc lcov_branch_coverage=1 --ignore-errors unused
          lcov --remove coverage.info '*/test/*' '/usr/*' --output-file coverage.info --rc lcov_branch_coverage=1 --ignore-errors unused
          lcov --list coverage.info --rc lcov_branch_coverage=1 --ignore-errors unused

      - name: Check coverage threshold
        run: |
          LINE_COV=$(lcov --summary coverage.info --ignore-errors unused 2>&1 | grep 'lines' | grep -oP '[\d.]+%' | head -1 | tr -d '%')
          echo "Line coverage: ${LINE_COV}%"
          # Target: >= 90%
          awk "BEGIN { exit ($LINE_COV < 90.0) ? 1 : 0 }"
