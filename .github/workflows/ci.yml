name: CI

on:
  push:
    branches: [ main, 'copilot/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Configure
        run: |
          mkdir build
          cd build
          CC=${{ matrix.compiler }} cmake ..

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure
